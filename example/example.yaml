header:
  enabled: true
  sticky: true             # (opzionale) la rende sticky
  topMenuMode: push          # overlay | push | flip (default overlay)
#  flipDuration: 3
  height: 72
  headerMenuStyle: wide
  headerMenuShowLabel: true
  headerMenuPosition: center
  
  
  style: |
    :host {
      --header-background: transparent !important;
      --header-backdrop-filter: blur(14px);
      --header-radius: 18px;
    }

    .header-inner {
      background: var(--header-background) !important;
      backdrop-filter: var(--header-backdrop-filter) !important;
      -webkit-backdrop-filter: var(--header-backdrop-filter) !important;
      border-radius: var(--header-radius) !important;
      margin: 8px 10px !important;
      padding: 6px 10px !important;
    }

    /* slot card: niente bordo/ombra */
    .header-card-slot > * {
      background: transparent !important;
      box-shadow: none !important;
      border: 0 !important;
    }

  # icone laterali (restano)

  rightMenu:
    - icon: mdi:menu
      name: Sidebar HA
      action: toggle-sidebar
    - icon: mdi:application
      name: Top bar
      action: toggle-topmenu
  
    

#  rightMenu:

  # LEFT: orario + data + meteo
  leftCard:
    type: horizontal-stack
    cards:
        #Orario
        - type: custom:button-card
          show_icon: false
          show_name: false
          show_state: false
          tap_action:
            action: none
          custom_fields:
            time: >
              [[[
                const d = new Date();
                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
              ]]]
            meta: >
              [[[
                const d = new Date();
                const dow = d.toLocaleDateString('it-IT', { weekday: 'short' });
                const day = d.toLocaleDateString('it-IT', { day: '2-digit', month: 'short' });
                const wx = states['weather.forecast_casa'];
                const st = wx?.state ?? '';
                const t = wx?.attributes?.temperature;
                const h = wx?.attributes?.humidity;
                const wxLine = (t !== undefined && h !== undefined) ? `${t}°C · ${h}%` : st;
                return `${dow} ${day} · ${wxLine}`;
              ]]]
          styles:
            card:
              - background: transparent
              - padding: 0
              - border-radius: 0
            grid:
              - grid-template-areas: '"time" "meta"'
              - grid-template-columns: 1fr
              - grid-template-rows: auto auto
              - row-gap: 2px
            custom_fields:
              time:
                - font-size: 34px
                - font-weight: 500
                - line-height: 1
                - color: "--var(black)"
                - text-align: left
                - white-space: nowrap
              meta:
                - font-size: 13px
                - font-weight: 600
                - line-height: 1.1
                - color: --var(black)"
                - text-align: left
                - white-space: nowrap
                - overflow: hidden
                - text-overflow: ellipsis
                - max-width: 520px

  # CENTER: chip menu colorati
  centerCard:
    type: custom:mushroom-chips-card
    alignment: center
    card_mod:
      style: |
        :host {
          margin: 0 !important;
          padding: 0 !important;
          --ha-card-margin: 0 !important;

          /* 👇 QUESTO RISOLVE IL TAGLIO */
          min-height: 56px;
          display: flex;
          align-items: center;
        }

        ha-card {
          background: transparent !important;
          box-shadow: none !important;
          border: none !important;
          padding: 6px 0 !important;   /* 👈 fondamentale */
          margin: 0 !important;
          min-height: 56px;
          display: flex;
          align-items: center;
        }

        mushroom-chips-card {
          min-height: 56px;
          padding: 4px 0;              /* 👈 spazio sopra/sotto chip */
          --chip-spacing: 10px !important;
        }
    

    chips:
      # 🏠 Home
      - type: action
        icon: mdi:home
        content: Home
        tap_action:
          action: navigate
          navigation_path: /casa-vaira/home
        card_mod:
          style: |
            :host {
              --chip-background: rgba(205, 255, 190, 0.95);
              --chip-icon-color: #0b1220;
              --chip-text-color: #0b1220;
              --chip-border-radius: 999px;
              --chip-box-shadow: 0 6px 16px rgba(0,0,0,0.10);
              --chip-border: 1px solid rgba(0,0,0,0.10);
            }

      # 🔋 Batteria Lenovo (colori + testo leggibile)
      - type: entity
        entity: sensor.lenovom11_battery_level
        show_name: false
        show_state: true
        show_icon: true
        icon: mdi:battery
        card_mod:
          style: |
            :host {
              {% set b = states('sensor.lenovo_batteria') | int(0) %}
              {% set bg = "var(--green)" if b >= 80 else ("var(--yellow)" if b >= 40 else "var(--red)") %}
              --chip-background: {{ bg }};
              /* testo: scuro su giallo/verde, chiaro su rosso */
              --chip-text-color: {% if b < 40 %} #ffffff {% else %} #0b1220 {% endif %};
              --chip-icon-color: {% if b < 40 %} #ffffff {% else %} #0b1220 {% endif %};
              --chip-border-radius: 999px;
              --chip-box-shadow: 0 6px 16px rgba(0,0,0,0.10);
              --chip-border: 1px solid rgba(0,0,0,0.10);
            }

      ###########################################################
      # 💡 LUCI (0 / >0)
      ###########################################################

      - type: conditional
        conditions:
          - entity: sensor.light_on_count
            state: "0"
        chip:
          type: template
          entity: sensor.light_on_count
          icon: mdi:lightbulb-outline
          content: "Luci 0"
          tap_action:
            action: navigate
            navigation_path: "#luci-rounded"
          card_mod:
            style: |
              :host {
                --chip-background: rgba(255,255,255,0.14);
                --chip-icon-color: var(--primary-text-color);
                --chip-text-color: var(--black)
                --chip-border-radius: 999px;
                --chip-border: 1px solid rgba(255,255,255,0.10);
                --chip-box-shadow: 0 6px 16px rgba(0,0,0,0.10);
                backdrop-filter: blur(8px);
              }

      - type: conditional
        conditions:
          - entity: sensor.light_on_count
            state_not: "0"
        chip:
          type: template
          entity: sensor.light_on_count
          icon: mdi:lightbulb-on
          content: >
            Luci {{ states('sensor.light_on_count')|int(0) }}
          tap_action:
            action: navigate
            navigation_path: "#luci-rounded"
          card_mod:
            style: |
              :host {
                --chip-background: rgba(255, 235, 140, 0.95);
                --chip-icon-color: #0b1220;
                --chip-text-color: #0b1220;
                --chip-border-radius: 999px;
                --chip-border: 1px solid rgba(0,0,0,0.10);
                --chip-box-shadow: 0 6px 16px rgba(0,0,0,0.12);
              }

      ###########################################################
      # 🪟 TAPPARELLE (0 / >0)
      ###########################################################

      - type: conditional
        conditions:
          - entity: sensor.tapparelle_aperte
            state: "0"
        chip:
          type: template
          entity: sensor.tapparelle_aperte
          icon: mdi:blinds
          content: "Tapp. 0"
          tap_action:
            action: navigate
            navigation_path: /casa-vaira/tapparelle
          card_mod:
            style: |
              :host {
                --chip-background: rgba(255,255,255,0.14);
                --chip-icon-color: var(--primary-text-color);
                --chip-text-color: var(--black)
                --chip-border-radius: 999px;
                --chip-border: 1px solid rgba(255,255,255,0.10);
                --chip-box-shadow: 0 6px 16px rgba(0,0,0,0.10);
                backdrop-filter: blur(8px);
              }

      - type: conditional
        conditions:
          - entity: sensor.tapparelle_aperte
            state_not: "0"
        chip:
          type: template
          entity: sensor.tapparelle_aperte
          icon: mdi:blinds-open
          content: >
            Tapp. {{ states('sensor.tapparelle_aperte')|int(0) }}
          tap_action:
            action: navigate
            navigation_path: /casa-vaira/tapparelle
          card_mod:
            style: |
              :host {
                --chip-background: rgba(255, 200, 140, 0.95);
                --chip-icon-color: #0b1220;
                --chip-text-color: #0b1220;
                --chip-border-radius: 999px;
                --chip-border: 1px solid rgba(0,0,0,0.10);
                --chip-box-shadow: 0 6px 16px rgba(0,0,0,0.12);
              }

      ###########################################################
      # 🪟 Grata terrazzo
      ###########################################################
      - type: template
        entity: binary_sensor.sensore_porta_contact
        icon: >-
          {% if is_state('binary_sensor.sensore_grata_cameretta_grande_contact','on') %}
            mdi:window-shutter-open
          {% else %}
            mdi:window-shutter
          {% endif %}
        content: Grata Terrazzo
        tap_action:
          action: more-info
        card_mod:
          style: |
            :host {
              --chip-background:
                {% if is_state('binary_sensor.sensore_grata_cameretta_grande_contact','on') %}
                  var(--red)
                {% else %}
                  rgba(205, 255, 190, 0.95)
                {% endif %};
              /* testo chiaro su rosso, scuro su verde chiaro */
              --chip-text-color:
                {% if is_state('binary_sensor.sensore_grata_cameretta_grande_contact','on') %}
                  #ffffff
                {% else %}
                  #0b1220
                {% endif %};
              --chip-icon-color:
                {% if is_state('binary_sensor.sensore_grata_cameretta_grande_contact','on') %}
                  #ffffff
                {% else %}
                  #0b1220
                {% endif %};
              --chip-border-radius: 999px;
              --chip-border: 1px solid rgba(0,0,0,0.10);
              --chip-box-shadow: 0 6px 16px rgba(0,0,0,0.12);
            }

      ###########################################################
      # 🪟 Grata cameretta
      ###########################################################
      - type: template
        entity: binary_sensor.sensore_grata_cameretta_grande_contact
        icon: >-
          {% if is_state('binary_sensor.sensore_grata_cameretta_grande_contact','on') %}
            mdi:window-shutter-open
          {% else %}
            mdi:window-shutter
          {% endif %}
        content: Grata Cameretta
        tap_action:
          action: more-info
        card_mod:
          style: |
            :host {
              --chip-background:
                {% if is_state('binary_sensor.sensore_grata_cameretta_grande_contact','on') %}
                  var(--red)
                {% else %}
                  rgba(205, 255, 190, 0.95)
                {% endif %};
              --chip-text-color:
                {% if is_state('binary_sensor.sensore_grata_cameretta_grande_contact','on') %}
                  #ffffff
                {% else %}
                  #0b1220
                {% endif %};
              --chip-icon-color:
                {% if is_state('binary_sensor.sensore_grata_cameretta_grande_contact','on') %}
                  #ffffff
                {% else %}
                  #0b1220
                {% endif %};
              --chip-border-radius: 999px;
              --chip-border: 1px solid rgba(0,0,0,0.10);
              --chip-box-shadow: 0 6px 16px rgba(0,0,0,0.12);
            }

      ###########################################################
      # 🚪 Porta (Tedee)
      ###########################################################
      - type: template
        entity: binary_sensor.tedee_porta
        icon: >-
          {% if is_state('binary_sensor.tedee_porta','on') %}
            mdi:door-open
          {% else %}
            mdi:door-closed
          {% endif %}
        content: Porta
        tap_action:
          action: more-info
        card_mod:
          style: |
            :host {
              --chip-background:
                {% if is_state('binary_sensor.tedee_porta','on') %}
                  var(--red)
                {% else %}
                  rgba(205, 255, 190, 0.95)
                {% endif %};
              --chip-text-color:
                {% if is_state('binary_sensor.tedee_porta','on') %}
                  #ffffff
                {% else %}
                  #0b1220
                {% endif %};
              --chip-icon-color:
                {% if is_state('binary_sensor.tedee_porta','on') %}
                  #ffffff
                {% else %}
                  #0b1220
                {% endif %};
              --chip-border-radius: 999px;
              --chip-border: 1px solid rgba(0,0,0,0.10);
              --chip-box-shadow: 0 6px 16px rgba(0,0,0,0.12);
            }

      ###########################################################
      # 🧺 Lavatrice ON/OFF
      ###########################################################
      - type: template
        entity: sensor.lavatrice
        icon: >-
          {% if states('sensor.lavatrice') != 'off' %}
            mdi:washing-machine
          {% else %}
            mdi:washing-machine-off
          {% endif %}
        content: >-
          {% if states('sensor.lavatrice') != 'off' %}
            Lavatrice ON
          {% else %}
            Lavatrice OFF
          {% endif %}
        tap_action:
          action: more-info
          entity: sensor.lavatrice
        card_mod:
          style: |
            :host {
              --chip-background:
                {% if states('sensor.lavatrice') != 'off' %}
                  rgba(255, 180, 210, 0.95)
                {% else %}
                  rgba(255,255,255,0.14)
                {% endif %};
              --chip-icon-color:
                {% if states('sensor.lavatrice') != 'off' %}
                  #0b1220
                {% else %}
                  var(--black)
                {% endif %};
              --chip-text-color:
                {% if states('sensor.lavatrice') != 'off' %}
                  #0b1220
                {% else %}
                  var(--black)
                {% endif %};
              --chip-border-radius: 999px;
              --chip-border: 1px solid rgba(0,0,0,0.10);
              --chip-box-shadow: 0 6px 16px rgba(0,0,0,0.10);
              backdrop-filter: blur(8px);
            }

      ###########################################################
      # ⚡ Consumo (per ora 1 chip, verde chiaro e testo scuro sempre)
      ###########################################################
      - type: conditional
        conditions:
          - entity: sensor.sonoff_casa_power
            state_not: "unknown"
        chip:
          type: template
          entity: sensor.sonoff_casa_power
          icon: mdi:flash
          content: >
            {% set w = states('sensor.sonoff_casa_power')|float(0) %}
            {{ w|round(0)|int }} W
          tap_action:
            action: navigate
            navigation_path: /casa-vaira/energia
          card_mod:
            style: |
              :host {
                --chip-background: rgba(205, 255, 190, 0.95);
                --chip-icon-color: #0b1220;
                --chip-text-color: #0b1220;
                --chip-border-radius: 999px;
                --chip-border: 1px solid rgba(0,0,0,0.10);
                --chip-box-shadow: 0 6px 16px rgba(0,0,0,0.12);
              }

      - type: conditional
        conditions:
          - entity: sensor.sonoff_casa_power
            state: "unknown"
        chip:
          type: template
          entity: sensor.sonoff_casa_power
          icon: mdi:flash-outline
          content: "Consumo --"
          tap_action:
            action: navigate
            navigation_path: /casa-vaira/energia
          card_mod:
            style: |
              :host {
                --chip-background: rgba(255,255,255,0.14);
                --chip-icon-color: var(--primary-text-color);
                --chip-text-color: var(--black)
                --chip-border-radius: 999px;
                --chip-border: 1px solid rgba(255,255,255,0.10);
                --chip-box-shadow: 0 6px 16px rgba(0,0,0,0.10);
                backdrop-filter: blur(8px);
              }
  
    
  
  

